# Use this line below to map caps lock to Home and Ctrl
# in input-remapper
# key(KEY_HOME).wait(10).hold(KEY_LEFTCTRL)

unbind C-b

set -g prefix C-Tab
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g focus-events on
set -g status-position top
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g mode-keys vi
set -g renumber-windows on
set -g set-titles on
set -g status-interval 1
set -g display-panes-time 3000
set -g display-time 2000
set -g visual-activity off # When other windows have activity, do not flash the status bar
set -g allow-passthrough on
set -sg escape-time 0
set -sg exit-empty on
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}(#(bash ~/tmux_title.sh "#{pane_current_path}"))'
setw -g xterm-keys on
setw -g pane-base-index 1

bind -n M-q kill-pane
bind -n M-t run 'tmux new-window -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}"'
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind T break-pane
bind C-s run 'tmux split-window -b -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}"'
bind C-v run 'tmux split-window -h -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}"'
bind s run 'tmux split-window -b -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}"'
bind v run 'tmux split-window -h -c "#{pane_current_path}" -e "TMUX_PARENT_PANE_ID=#{pane_id}"'

bind f resize-pane -Z
bind C-f resize-pane -Z
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3
bind -r Left resize-pane -L 3
bind -r Right resize-pane -R 3

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind -n C-v if-shell "$is_vim" 'send-keys C-v' 'copy-mode'
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -LZ'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -DZ'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -UZ'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -RZ'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_cpu}"
run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux # Must run after catppuccin
if-shell 'ls /sys/class/power_supply/BAT* 1>/dev/null 2>&1' \
  'set -agF status-right "#{E:@catppuccin_status_battery}"'
run ~/.config/tmux/plugins/tmux-battery/battery.tmux # Must run after catppuccin
set -ag status-right "#{E:@catppuccin_status_date_time}"
run ~/.config/tmux/plugins/tmux-yank/yank.tmux
bind -T copy-mode-vi Y send-keys -X copy-end-of-line\; send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
